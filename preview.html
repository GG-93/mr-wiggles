<!DOCTYPE html>
<!--
  Mr. Wiggles – Standalone Visual Preview
  ════════════════════════════════════════
  Open this file directly in any browser — no server, no install needed.
  A built-in demo feeds simulated signals so every animation runs immediately.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr. Wiggles 🌀 – Preview (Demo)</title>
  <style>
/* ── Reset ──────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Variables ──────────────────────────────────────────────────────────── */
:root {
  --bg: #0a0a0a;
  --surface: #111;
  --surface2: #1a1a1a;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --text-muted: #888;
  --accent: #00e5ff;
  --accent2: #ff4081;
  --located: #76ff03;
  --panel-w: 280px;
  --header-h: 52px;
  --font: 'Courier New', Courier, monospace;
}

/* ── Base ───────────────────────────────────────────────────────────────── */
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────────────────────────────── */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 100;
}

.header__logo {
  font-size: 18px;
  font-weight: bold;
  letter-spacing: 2px;
  color: var(--accent);
}

.header__status {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
}

/* ── Status dot ─────────────────────────────────────────────────────────── */
.status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
}
.status-dot--disconnected { background: #f44336; }
.status-dot--connecting   { background: #ff9800; animation: blink 1s infinite; }
.status-dot--connected    { background: #4caf50; }
.status-dot--demo         { background: #ff9800; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}

/* ── Demo badge ─────────────────────────────────────────────────────────── */
.demo-badge {
  background: var(--accent2);
  color: #fff;
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 1px;
  padding: 2px 7px;
  border-radius: 3px;
  text-transform: uppercase;
}

/* ── Layout ─────────────────────────────────────────────────────────────── */
.layout {
  display: flex;
  height: 100vh;
  padding-top: var(--header-h);
}

/* ── Canvas ─────────────────────────────────────────────────────────────── */
.canvas-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #000;
}

#js-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* ── Located banner ─────────────────────────────────────────────────────── */
.located-banner {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--located);
  color: #000;
  font-weight: bold;
  font-size: 16px;
  padding: 10px 28px;
  border-radius: 4px;
  letter-spacing: 2px;
  animation: pulse-banner 0.8s ease-in-out infinite alternate;
}

@keyframes pulse-banner {
  from { box-shadow: 0 0 10px var(--located); }
  to   { box-shadow: 0 0 30px var(--located), 0 0 60px var(--located); }
}

.hidden { display: none !important; }

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
.sidebar {
  width: var(--panel-w);
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
}

/* ── Panel ──────────────────────────────────────────────────────────────── */
.panel {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}

.panel__title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 10px;
}

/* ── Signal select ──────────────────────────────────────────────────────── */
.signal-select {
  width: 100%;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px;
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
  border-radius: 2px;
}

.signal-select:focus {
  outline: none;
  border-color: var(--accent);
}

/* ── Info table ─────────────────────────────────────────────────────────── */
.info-table {
  width: 100%;
  border-collapse: collapse;
}

.info-table th {
  text-align: left;
  color: var(--text-muted);
  font-weight: normal;
  padding: 3px 0;
  white-space: nowrap;
  width: 72px;
}

.info-table td {
  color: var(--text);
  padding: 3px 0;
  word-break: break-all;
}

/* ── Signal list ─────────────────────────────────────────────────────────── */
.signal-list {
  list-style: none;
}

.signal-list__item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}

.signal-list__item:hover { background: var(--surface2); padding-left: 4px; }
.signal-list__item--target { color: var(--accent); }

.signal-list__dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.signal-list__name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.signal-list__rssi {
  color: var(--text-muted);
  font-size: 11px;
}

/* ── Legend ─────────────────────────────────────────────────────────────── */
.legend { list-style: none; }

.legend li {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  color: var(--text-muted);
  font-size: 11px;
}

.legend__swatch {
  width: 28px; height: 4px;
  flex-shrink: 0;
  border-radius: 2px;
}

.legend__swatch--ring     { background: #fff; }
.legend__swatch--beat     { background: var(--accent); }
.legend__swatch--thick    { background: #fff; height: 8px; }
.legend__swatch--located  { background: var(--located); }

/* ── Scrollbar ──────────────────────────────────────────────────────────── */
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>

  </main>

  <script>
'use strict';

/* ══════════════════════════════════════════════════════════════════════════
   renderer.js (inlined)
   ══════════════════════════════════════════════════════════════════════════ */
class Renderer {
  constructor(canvas) {
    this._canvas = canvas;
    this._ctx = canvas.getContext('2d');
    this._signals = [];
    this._targetId = null;
    this._time = 0;
    this._lastTs = null;
    this._rafId = null;
    this._rings = new Map();
    this._resize();
    window.addEventListener('resize', () => this._resize());
  }

  setSignals(signals) { this._signals = signals; }
  setTarget(id)       { this._targetId = id; }

  start() {
    if (this._rafId) return;
    this._lastTs = performance.now();
    this._loop(this._lastTs);
  }

  stop() {
    if (this._rafId) { cancelAnimationFrame(this._rafId); this._rafId = null; }
  }

  _resize() {
    const dpr = window.devicePixelRatio || 1;
    const w = this._canvas.clientWidth;
    const h = this._canvas.clientHeight;
    this._canvas.width  = w * dpr;
    this._canvas.height = h * dpr;
    this._ctx.scale(dpr, dpr);
    this._w = w; this._h = h;
    this._cx = w / 2; this._cy = h / 2;
    this._maxR = Math.min(w, h) * 0.45;
  }

  _loop(ts) {
    this._rafId = requestAnimationFrame((t) => this._loop(t));
    const dt = (ts - (this._lastTs || ts)) / 1000;
    this._lastTs = ts;
    this._time += dt;
    this._update(dt);
    this._draw();
  }

  _update(dt) {
    for (const sig of this._signals) {
      if (!this._rings.has(sig.id)) this._rings.set(sig.id, []);
      const rings = this._rings.get(sig.id);
      const beatFreqSafe = sig.beatFreq > 0 ? sig.beatFreq : 0.5;
      const spawnInterval = 0.4 / beatFreqSafe;
      if (!sig._nextSpawn || this._time >= sig._nextSpawn) {
        sig._nextSpawn = this._time + spawnInterval;
        rings.push({
          radius: 0, alpha: 0.9,
          doa: sig.doa, rssi: sig.rssi,
          strength: sig.strength || 0.5,
          active: sig.active,
          beatFreq: sig.beatFreq || 0.5,
          beatPhase: Math.random() * Math.PI * 2,
          born: this._time,
        });
      }
      for (let i = rings.length - 1; i >= 0; i--) {
        const r = rings[i];
        const speed = this._maxR * (0.25 + (sig.beatFreq || 0.5) * 0.35);
        r.radius += speed * dt;
        r.alpha = Math.max(0, 0.9 - (r.radius / this._maxR) * 0.9);
        if (r.radius > this._maxR * 1.1) rings.splice(i, 1);
      }
    }
    for (const id of this._rings.keys()) {
      if (!this._signals.find((s) => s.id === id)) this._rings.delete(id);
    }
  }

  _draw() {
    const ctx = this._ctx;
    const { _w: w, _h: h, _cx: cx, _cy: cy } = this;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);
    this._drawGrid(ctx, cx, cy, w, h);
    const targetSig = this._signals.find((s) => s.id === this._targetId);
    for (const sig of this._signals) {
      if (sig.id === this._targetId) continue;
      this._drawSignal(ctx, sig, false);
    }
    if (targetSig) this._drawSignal(ctx, targetSig, true);
    this._drawCenter(ctx, cx, cy);
  }

  _drawGrid(ctx, cx, cy, w, h) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    const step = this._maxR / 5;
    for (let r = step; r <= this._maxR; r += step) {
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(cx - this._maxR, cy); ctx.lineTo(cx + this._maxR, cy);
    ctx.moveTo(cx, cy - this._maxR); ctx.lineTo(cx, cy + this._maxR);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('N', cx, cy - this._maxR - 6);
    ctx.fillText('S', cx, cy + this._maxR + 14);
    ctx.textAlign = 'left';
    ctx.fillText('E', cx + this._maxR + 6, cy + 4);
    ctx.fillText('W', cx - this._maxR - 20, cy + 4);
    ctx.restore();
  }

  _drawCenter(ctx, cx, cy) {
    ctx.save();
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 16);
    grd.addColorStop(0, 'rgba(0,229,255,0.4)');
    grd.addColorStop(1, 'rgba(0,229,255,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#00e5ff';
    ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,229,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy, 12, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }

  _drawSignal(ctx, sig, isTarget) {
    const rings = this._rings.get(sig.id) || [];
    const dimFactor = isTarget ? 1.0 : 0.45;
    for (const ring of rings) this._drawCrescentRipple(ctx, ring, sig, isTarget, dimFactor);
    if (sig.located) this._drawLocatedCircle(ctx, sig, dimFactor);
  }

  _drawCrescentRipple(ctx, ring, sig, isTarget, dimFactor) {
    const { _cx: cx, _cy: cy } = this;
    const { radius, alpha, doa, strength, active, beatFreq, beatPhase, born } = ring;
    if (radius < 1) return;
    const doaRad = (doa - 90) * (Math.PI / 180);
    const halfSpan = (Math.PI / 6) + strength * (Math.PI / 4);
    const startAngle = doaRad - halfSpan;
    const endAngle   = doaRad + halfSpan;
    const lineWidth  = isTarget ? 1 + strength * 4 : 0.5 + strength * 2;
    const hue = isTarget ? '0,229,255' : '255,255,255';
    ctx.save();
    const layers = 3;
    for (let l = 0; l < layers; l++) {
      const r = radius - l * 8;
      if (r < 1) continue;
      const layerAlpha = alpha * (1 - l * 0.25) * dimFactor;
      if (layerAlpha <= 0) continue;
      ctx.beginPath();
      ctx.arc(cx, cy, r, startAngle, endAngle);
      ctx.strokeStyle = `rgba(${hue},${layerAlpha.toFixed(3)})`;
      ctx.lineWidth = lineWidth * (1 - l * 0.2);
      ctx.lineCap = 'round';
      ctx.stroke();
      if (active) {
        this._drawBeatWaves(ctx, cx, cy, r, startAngle, endAngle,
          hue, layerAlpha, beatFreq, beatPhase, born, lineWidth);
      }
    }
    ctx.restore();
  }

  _drawBeatWaves(ctx, cx, cy, radius, startAngle, endAngle,
      hue, alpha, beatFreq, beatPhase, born, baseLineWidth) {
    const steps = 60;
    const span  = endAngle - startAngle;
    const beatT = this._time * beatFreq * Math.PI * 2 + beatPhase;
    const waveAmp = 4 + baseLineWidth * 0.5;
    ctx.save();
    ctx.lineWidth = 1;
    ctx.strokeStyle = `rgba(${hue},${(alpha * 0.6).toFixed(3)})`;
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const angle = startAngle + t * span;
      const wave  = Math.sin(t * Math.PI * 6 + beatT) * waveAmp;
      const r = radius + wave;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();
  }

  _drawLocatedCircle(ctx, sig, dimFactor) {
    const { _cx: cx, _cy: cy } = this;
    const r     = 30 + (sig.strength || 0) * 40;
    const pulse = 0.7 + 0.3 * Math.sin(this._time * 4);
    const doaRad = (sig.doa - 90) * (Math.PI / 180);
    const dist   = this._maxR * 0.35;
    const gx = cx + Math.cos(doaRad) * dist;
    const gy = cy + Math.sin(doaRad) * dist;
    ctx.save();
    const grd = ctx.createRadialGradient(gx, gy, 0, gx, gy, r * 1.5);
    grd.addColorStop(0, `rgba(118,255,3,${(0.3 * pulse * dimFactor).toFixed(3)})`);
    grd.addColorStop(1, 'rgba(118,255,3,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(gx, gy, r * 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = `rgba(118,255,3,${(pulse * dimFactor).toFixed(3)})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(gx, gy, r, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = `rgba(118,255,3,${(0.8 * pulse * dimFactor).toFixed(3)})`;
    ctx.beginPath(); ctx.arc(gx, gy, 6, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   demo.js (standalone-only) – simulates live signal updates
   ══════════════════════════════════════════════════════════════════════════ */

// Seed signal definitions
const DEMO_SIGNALS_INIT = [
  {
    id: 'wifi-1',
    ssid: 'HomeNetwork_5G',
    mac: 'AA:BB:CC:DD:EE:01',
    freqMHz: 5180,
    channel: 36,
    protocol: 'Wi-Fi 802.11ac',
    doa: 35,
    rssi: -52,
    active: true,
    located: false,
  },
  {
    id: 'wifi-2',
    ssid: 'CoffeeShop_Free',
    mac: 'AA:BB:CC:DD:EE:02',
    freqMHz: 2437,
    channel: 6,
    protocol: 'Wi-Fi 802.11n',
    doa: 145,
    rssi: -68,
    active: true,
    located: false,
  },
  {
    id: 'ble-1',
    ssid: 'BLE Tracker #7',
    mac: 'FF:EE:DD:CC:BB:03',
    freqMHz: 2402,
    channel: null,
    protocol: 'BLE 5.0',
    doa: 270,
    rssi: -74,
    active: true,
    located: false,
  },
  {
    id: 'wifi-3',
    ssid: 'NeighbourNet',
    mac: 'AA:BB:CC:DD:EE:04',
    freqMHz: 2412,
    channel: 1,
    protocol: 'Wi-Fi 802.11n',
    doa: 200,
    rssi: -81,
    active: false,
    located: false,
  },
  {
    id: 'ble-2',
    ssid: 'SmartWatch_GG93',
    mac: 'FF:EE:DD:CC:BB:05',
    freqMHz: 2480,
    channel: null,
    protocol: 'BLE 4.2',
    doa: 90,
    rssi: -60,
    active: true,
    located: false,
  },
];

// Derive beatFreq and strength from seed data, and cache base values
function hydrate(raw) {
  return raw.map((s) => ({
    ...s,
    strength: Math.min(1, Math.max(0, (s.rssi + 100) / 50)),
    beatFreq: s.freqMHz > 3000 ? 1.8 : 0.9,
    _baseDoa:  s.doa,
    _baseRssi: s.rssi,
    _seed:     s.id.charCodeAt(s.id.length - 1),
  }));
}

let demoSignals = hydrate(JSON.parse(JSON.stringify(DEMO_SIGNALS_INIT)));

// Slowly drift DoA and RSSI so the visualization keeps moving
let demoTime = 0;
const LOCATE_TARGET_DELAY_MS = 8000; // selected target auto-located after 8 s
let locatedFired = false;

// Module-scoped; updated by the app closure via setCurrentTargetId()
let currentTargetId = null;
function setCurrentTargetId(id) { currentTargetId = id; }

function tickDemo(dtMs) {
  demoTime += dtMs;
  const t = demoTime / 1000;

  for (const sig of demoSignals) {
    const { _baseDoa, _baseRssi, _seed: seed } = sig;

    // Drift DoA slowly
    sig.doa = ((_baseDoa + Math.sin(t * 0.3 + seed) * 18) % 360 + 360) % 360;

    // Fluctuate RSSI ±4 dBm
    sig.rssi     = _baseRssi + Math.sin(t * 0.7 + seed * 0.1) * 4;
    sig.strength = Math.min(1, Math.max(0, (sig.rssi + 100) / 50));

    // Toggle active state occasionally
    sig.active = (Math.sin(t * 0.2 + seed) > -0.7);
  }

  // Auto-locate the selected target after a few seconds (demo wow-factor)
  if (!locatedFired && demoTime >= LOCATE_TARGET_DELAY_MS) {
    locatedFired = true;
    const selectedSignal = demoSignals.find((s) => s.id === currentTargetId);
    if (selectedSignal) selectedSignal.located = true;
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   app.js (adapted for standalone demo)
   ══════════════════════════════════════════════════════════════════════════ */
(function () {

  // ── DOM refs ────────────────────────────────────────────────────────────
  const canvas        = document.getElementById('js-canvas');
  const targetSelect  = document.getElementById('js-target-select');
  const signalList    = document.getElementById('js-signal-list');
  const locatedBanner = document.getElementById('js-located-banner');

  const infoSsid     = document.getElementById('js-info-ssid');
  const infoMac      = document.getElementById('js-info-mac');
  const infoRssi     = document.getElementById('js-info-rssi');
  const infoDoa      = document.getElementById('js-info-doa');
  const infoFreq     = document.getElementById('js-info-freq');
  const infoChannel  = document.getElementById('js-info-channel');
  const infoProtocol = document.getElementById('js-info-protocol');
  const infoStatus   = document.getElementById('js-info-status');

  // ── State ───────────────────────────────────────────────────────────────
  // currentTargetId is module-scoped in the demo ticker; update via setCurrentTargetId()

  // ── Renderer ─────────────────────────────────────────────────────────────
  const renderer = new Renderer(canvas);
  renderer.start();

  // ── Kick off first render with initial signals ────────────────────────────
  renderer.setSignals(demoSignals);
  populateSelect();
  updateSignalList();

  // Auto-select first signal for instant visual impact
  if (demoSignals.length > 0) {
    targetSelect.value = demoSignals[0].id;
    setCurrentTargetId(demoSignals[0].id);
    renderer.setTarget(demoSignals[0].id);
    updateInfoPanel();
  }

  // ── Demo tick loop (every 250 ms) ─────────────────────────────────────────
  let lastTickTime = performance.now();
  function demoPoll() {
    const now = performance.now();
    tickDemo(now - lastTickTime);
    lastTickTime = now;

    renderer.setSignals(demoSignals);
    updateSignalList();
    updateInfoPanel();
    updateLocatedBanner();
    setTimeout(demoPoll, 250);
  }
  setTimeout(demoPoll, 250);

  // ── Signal selection ──────────────────────────────────────────────────────
  targetSelect.addEventListener('change', () => {
    const id = targetSelect.value || null;
    setCurrentTargetId(id);
    renderer.setTarget(id);
    // Reset demo ticker so auto-location restarts for the new target
    demoTime = 0;
    locatedFired = false;
    demoSignals.forEach((s) => { s.located = false; });
    updateInfoPanel();
    updateLocatedBanner();
  });

  // ── UI helpers ────────────────────────────────────────────────────────────

  function populateSelect() {
    for (const sig of demoSignals) {
      const opt = document.createElement('option');
      opt.value = sig.id;
      opt.textContent = `${sig.ssid} (${sig.mac})`;
      targetSelect.appendChild(opt);
    }
  }

  function updateSignalList() {
    const existing = new Map(
      Array.from(signalList.querySelectorAll('li[data-id]'))
        .map((el) => [el.dataset.id, el])
    );
    const ids = new Set(demoSignals.map((s) => s.id));
    for (const [id, el] of existing) {
      if (!ids.has(id)) el.remove();
    }
    for (const sig of demoSignals) {
      let item = existing.get(sig.id);
      if (!item) {
        item = document.createElement('li');
        item.className = 'signal-list__item';
        item.dataset.id = sig.id;
        item.innerHTML = `
          <span class="signal-list__dot"></span>
          <span class="signal-list__name"></span>
          <span class="signal-list__rssi"></span>
        `;
        item.addEventListener('click', () => {
          targetSelect.value = sig.id;
          targetSelect.dispatchEvent(new Event('change'));
        });
        signalList.appendChild(item);
      }
      const dot  = item.querySelector('.signal-list__dot');
      const name = item.querySelector('.signal-list__name');
      const rssi = item.querySelector('.signal-list__rssi');
      dot.style.background = strengthToColor(sig.strength || 0);
      name.textContent = sig.ssid || sig.mac;
      rssi.textContent = `${sig.rssi != null ? sig.rssi.toFixed(1) : '—'} dBm`;
      item.classList.toggle('signal-list__item--target', sig.id === window.currentTargetId);
    }
  }

  function updateInfoPanel() {
    const sig = demoSignals.find((s) => s.id === window.currentTargetId);
    if (!sig) {
      [infoSsid, infoMac, infoRssi, infoDoa, infoFreq, infoChannel, infoProtocol, infoStatus]
        .forEach((el) => { el.textContent = '—'; });
      return;
    }
    infoSsid.textContent     = sig.ssid || '—';
    infoMac.textContent      = sig.mac  || '—';
    infoRssi.textContent     = sig.rssi != null ? `${sig.rssi.toFixed(1)} dBm` : '—';
    infoDoa.textContent      = sig.doa  != null ? `${sig.doa.toFixed(1)}°`     : '—';
    infoFreq.textContent     = sig.freqMHz  ? `${sig.freqMHz} MHz`  : '—';
    infoChannel.textContent  = sig.channel  ? String(sig.channel)   : '—';
    infoProtocol.textContent = sig.protocol || '—';
    infoStatus.textContent   = sig.located ? '📍 Located'
                             : sig.active  ? '📡 Active'
                             : '💤 Idle';
    infoStatus.style.color   = sig.located ? '#76ff03'
                             : sig.active  ? '#00e5ff'
                             : '#888';
  }

  function updateLocatedBanner() {
    const located = demoSignals.some((s) => s.id === window.currentTargetId && s.located);
    locatedBanner.classList.toggle('hidden', !located);
  }

  function strengthToColor(s) {
    if (s < 0.3) return '#2196f3';
    if (s < 0.6) return '#00e5ff';
    if (s < 0.8) return '#76ff03';
    return '#ff4081';
  }

})();
  </script>
</body>
</html>
