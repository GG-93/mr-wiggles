<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="72" fill="#0a0a0a"/>

  <!-- Grid rings -->
  <circle cx="256" cy="256" r="97"  fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.12"/>
  <circle cx="256" cy="256" r="138" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.12"/>
  <circle cx="256" cy="256" r="179" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.12"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.12"/>

  <!-- Crescent ripples (NE direction) -->
  <path d="M 138 156 A 140 140 0 0 1 337 122" fill="none" stroke="#00e5ff" stroke-width="18" stroke-linecap="round" opacity="0.85"/>
  <path d="M 118 178 A 178 178 0 0 1 367 104" fill="none" stroke="#00e5ff" stroke-width="13" stroke-linecap="round" opacity="0.55"/>
  <path d="M  97 200 A 220 220 0 0 1 401  83" fill="none" stroke="#00e5ff" stroke-width="8"  stroke-linecap="round" opacity="0.30"/>

  <!-- Center glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </radialGradient>
  <circle cx="256" cy="256" r="60" fill="url(#glow)"/>

  <!-- Center ring -->
  <circle cx="256" cy="256" r="26" fill="none" stroke="#00e5ff" stroke-width="5" opacity="0.70"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="13" fill="#00e5ff"/>
</svg>
